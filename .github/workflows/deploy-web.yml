name: Build Flutter Web and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

jobs:
  build-flutter-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build web
        working-directory: mobile
        run: flutter build web --release --dart-define=API_BASE_URL=https://act-ai-tutor-production.up.railway.app/api

      - name: Copy build to backend/public
        run: |
          rm -rf backend/public
          cp -r mobile/build/web backend/public

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add backend/public/
          git diff --staged --quiet || git commit -m "Auto-build: Update Flutter web app"
          git push
