name: act_ai_tutor
description: AI-powered ACT test preparation mobile application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Networking
  http: ^1.1.0

  # Local Cache (offline support)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Image Upload (for chat)
  image_picker: ^1.0.4

  # Charts (analytics)
  fl_chart: ^0.64.0

  # Token Storage
  shared_preferences: ^2.2.2

  # Network Status Detection
  connectivity_plus: ^5.0.2

  # Utilities
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/
